name: backend-ci

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: khalid123
          POSTGRES_DB: dispatch
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d dispatch"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:khalid123@localhost:5432/dispatch
      REDIS_URL: redis://localhost:6379/0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy apps libs tests

      - name: Pytest with coverage
        run: pytest --cov=apps --cov=libs --cov-report=term-missing --cov-fail-under=80 tests/
